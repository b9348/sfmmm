name: Build & Release

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Auto bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限才能 push commit & tag
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6

      - name: Bump patch version
        id: bump
        run: |
          # 只检查 subject（第一行），避免 body 中的说明文字误匹配
          SUBJECT="$(echo "${{ github.event.head_commit.message }}" | head -1)"
          if echo "$SUBJECT" | grep -q '\[skip version\]'; then
            echo "检测到 [skip version]，跳过 bump"
            echo "new_version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # 去除前导零（如果有）
          PATCH=$((10#$PATCH))
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Bumping $VERSION → $NEW_VERSION"

          # 更新 tauri.conf.json
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf-8'));
            c.version = '$NEW_VERSION';
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
          "

          # 更新 Cargo.toml
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml

          # 更新 src/version.js 中的 APP_VERSION
          sed -i "s/APP_VERSION = '$VERSION'/APP_VERSION = '$NEW_VERSION'/" src/version.js

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "chore: bump version to v$NEW_VERSION [skip version]"

          # 创建 tag
          git tag "v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Push commit & tag
        if: steps.bump.outputs.new_version != ''
        run: git push origin main --tags

  build:
    name: Build NSIS installer
    needs: bump
    # 只有 bump 了版本才构建（跳过 [skip version] 的推送）
    if: needs.bump.outputs.new_version != ''
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install
        shell: bash

      - name: Create .env
        run: |
          echo "DB_URL=${{ secrets.DB_URL }}" > src-tauri/.env
        shell: bash

      - name: Build Tauri (NSIS)
        run: pnpm tauri build
        env:
          HTTPS_PROXY: ''
          HTTP_PROXY: ''

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v7
        with:
          name: nsis-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create Release & Update Cloud
    needs: [bump, build]
    if: needs.bump.outputs.new_version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: nsis-installer

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.bump.outputs.new_version }}
          name: v${{ needs.bump.outputs.new_version }}
          body: |
            ## v${{ needs.bump.outputs.new_version }}

            自动构建安装包，下载后运行即可更新。
          files: |
            *.exe
          generate_release_notes: true

      - name: Upload to ImgBed & Update Cloud Version
        shell: bash
        run: |
          EXE_FILE=$(ls *.exe | head -1)
          if [ -z "$EXE_FILE" ]; then
            echo "::error::No .exe installer found in workspace"
            exit 1
          fi
          echo "Found installer: $EXE_FILE"

          NEW_VERSION="${{ needs.bump.outputs.new_version }}"

          # 1. 上传安装包到 ImgBed（图床 CDN）
          echo "::group::Upload to ImgBed"
          UPLOAD_RESP=$(curl -s -X POST \
            "https://img.b9349.dpdns.org/upload?uploadChannel=telegram&uploadFolder=sfm/installer/v${NEW_VERSION}&returnFormat=full" \
            -H "Authorization: Bearer ${{ secrets.IMGBED_TOKEN }}" \
            -F "file=@${EXE_FILE}")
          echo "ImgBed response: $UPLOAD_RESP"
          echo "::endgroup::"

          DOWNLOAD_URL=$(echo "$UPLOAD_RESP" | jq -r '.[0].src // empty')
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "::error::Failed to upload to ImgBed"
            echo "$UPLOAD_RESP"
            exit 1
          fi
          echo "Download URL: $DOWNLOAD_URL"

          # 2. 通过 DB_URL 直连 MySQL 更新 version_config
          #（Cloud API sfm.b9349.dpdns.org 在 CI 中不可达，故用直连方式）
          echo "::group::Update version_config via MySQL"
          apt-get update -qq && apt-get install -y -qq default-mysql-client 2>&1 | tail -2

          RAW="${{ secrets.DB_URL }}"
          RAW="${RAW#mysql://}"
          DB_USER="${RAW%%:*}"
          REST="${RAW#*:}"
          DB_PASS="${REST%%@*}"
          REST="${REST#*@}"
          DB_HOST="${REST%%:*}"
          REST="${REST#*:}"
          DB_PORT="${REST%%/*}"
          DB_NAME="${REST#*/}"

          mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" \
            -e "UPDATE version_config SET version='${NEW_VERSION}', update_url='${DOWNLOAD_URL}' WHERE id=1"
          echo "✅ Cloud version config updated to v${NEW_VERSION} — ${DOWNLOAD_URL}"
          echo "::endgroup::"
